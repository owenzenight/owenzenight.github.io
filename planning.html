<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSC — Planning</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;700&family=Syne:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --surface: #0a0a0f;
      --border: rgba(120, 60, 255, 0.2);
      --accent: #7c3aff;
      --accent2: #c026d3;
      --neon: #a855f7;
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.4);
      --cours: #7c3aff;
      --taf: #2563eb;
      --conge: #16a34a;
      --sport: #ea580c;
      --perso: #db2777;
      --exam: #dc2626;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== LOCK SCREEN ===== */
    #lock-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
      gap: 2.5rem;
      overflow: hidden;
    }
    #lock-screen.hidden { display: none; }

    #lock-screen::before {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(120,40,255,0.15) 0%, transparent 65%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: orb 5s ease-in-out infinite;
    }
    #lock-screen::after {
      content: '';
      position: absolute;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(192,38,211,0.1) 0%, transparent 65%);
      bottom: 5%; right: 5%;
      pointer-events: none;
      animation: orb 7s ease-in-out infinite reverse;
    }
    @keyframes orb {
      0%,100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      50% { opacity: 0.6; transform: translate(-50%,-50%) scale(1.2); }
    }

    .lock-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.6rem, 2.5vw, 0.85rem);
      font-weight: 300;
      letter-spacing: 0.7em;
      text-transform: uppercase;
      color: rgba(168,85,247,0.6);
      position: relative;
      z-index: 1;
    }

    .lock-card {
      position: relative;
      z-index: 1;
      background: rgba(8,4,18,0.9);
      border: 1px solid rgba(120,60,255,0.2);
      border-radius: 20px;
      padding: 44px 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      backdrop-filter: blur(24px);
      box-shadow: 0 0 60px rgba(120,40,255,0.12), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .lock-icon { font-size: 1.8rem; opacity: 0.5; }

    .lock-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .lock-input {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(120,60,255,0.25);
      border-radius: 10px;
      padding: 14px 24px;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.4em;
      text-align: center;
      outline: none;
      width: 260px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .lock-input:focus {
      border-color: rgba(168,85,247,0.6);
      box-shadow: 0 0 24px rgba(120,40,255,0.18);
    }

    .lock-btn {
      background: linear-gradient(135deg, #7c3aff 0%, #c026d3 100%);
      border: none;
      border-radius: 10px;
      padding: 13px 0;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.3s, transform 0.2s, box-shadow 0.3s;
      box-shadow: 0 4px 24px rgba(120,40,255,0.3);
    }
    .lock-btn:hover {
      opacity: 0.88;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(120,40,255,0.5);
    }

    .lock-error {
      color: #f87171;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .lock-error.visible { opacity: 1; }

    /* ===== APP ===== */
    #app { display: none; min-height: 100vh; }
    #app.visible { display: block; }

    /* Header */
    .header {
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .header-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--neon);
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 16px;
      border-radius: 4px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-btn:hover, .nav-btn.active {
      border-color: var(--accent);
      color: #fff;
      background: rgba(124,58,255,0.1);
    }

    .current-month {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.3em;
      min-width: 200px;
      text-align: center;
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 16px;
      padding: 12px 32px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }

    /* Calendar Grid */
    .calendar-container { padding: 24px 32px; }

    .days-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 8px;
    }

    .day-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
      padding: 8px 0;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      min-height: 100px;
      padding: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .day-cell:hover {
      border-color: var(--accent);
      background: rgba(124,58,255,0.05);
    }

    .day-cell.empty {
      background: transparent;
      border-color: transparent;
      cursor: default;
    }

    .day-cell.today {
      border-color: var(--neon);
      background: rgba(168,85,247,0.08);
    }

    .day-number {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .day-cell.today .day-number { color: var(--neon); }

    .event-chip {
      display: block;
      font-size: 0.55rem;
      padding: 2px 6px;
      border-radius: 3px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.05em;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.visible { display: flex; }

    .modal {
      background: #0d0d18;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 90%;
      max-width: 480px;
      position: relative;
    }

    .modal-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--neon);
      margin-bottom: 24px;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.2s;
    }
    .modal-close:hover { color: #fff; }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-input, .form-select {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }
    .form-select option { background: #0d0d18; }

    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 20px;
      border-radius: 6px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: #fff; color: #fff; }

    .btn-save {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 8px 20px;
      border-radius: 6px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save:hover { background: var(--accent2); }

    .btn-delete {
      background: rgba(220,38,38,0.15);
      border: 1px solid rgba(220,38,38,0.3);
      color: #ef4444;
      padding: 8px 20px;
      border-radius: 6px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-delete:hover { background: rgba(220,38,38,0.3); }

    /* Events list in modal */
    .events-list { margin-bottom: 20px; }
    .event-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 0.75rem;
    }
    .event-item-delete {
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      font-size: 0.8rem;
      transition: color 0.2s;
    }
    .event-item-delete:hover { color: #ef4444; }

    @media (max-width: 640px) {
      .header { padding: 16px; flex-wrap: wrap; gap: 12px; }
      .calendar-container { padding: 12px; }
      .legend { padding: 10px 16px; }
      .day-cell { min-height: 60px; padding: 4px; }
      .day-number { font-size: 0.6rem; }
      .event-chip { font-size: 0.45rem; }
      .current-month { font-size: 0.7rem; min-width: 140px; }
    }
  </style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <div class="lock-title">JSC — Planning</div>
  <div class="lock-card">
    <div class="lock-icon">🔒</div>
    <div class="lock-form">
      <input type="password" class="lock-input" id="pwd-input" placeholder="••••••••" autocomplete="off">
      <button class="lock-btn" onclick="checkPassword()">Accéder</button>
      <div class="lock-error" id="lock-error">Mot de passe incorrect</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-title">Planning</div>
    <div class="header-nav">
      <button class="nav-btn" onclick="prevMonth()">◄</button>
      <div class="current-month" id="current-month"></div>
      <button class="nav-btn" onclick="nextMonth()">►</button>
    </div>
    <button class="nav-btn" onclick="goToday()">Aujourd'hui</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#7c3aff"></div>Cours</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div>Taf</div>
    <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div>Congé</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ea580c"></div>Sport</div>
    <div class="legend-item"><div class="legend-dot" style="background:#db2777"></div>Perso</div>
    <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div>Exam / Deadline</div>
  </div>

  <div class="calendar-container">
    <div class="days-header">
      <div class="day-name">Lun</div>
      <div class="day-name">Mar</div>
      <div class="day-name">Mer</div>
      <div class="day-name">Jeu</div>
      <div class="day-name">Ven</div>
      <div class="day-name">Sam</div>
      <div class="day-name">Dim</div>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-date-title"></div>

    <!-- Liste des événements existants -->
    <div class="events-list" id="events-list"></div>

    <!-- Formulaire ajout -->
    <div class="form-group">
      <label class="form-label">Titre</label>
      <input type="text" class="form-input" id="event-title" placeholder="Ex: Cours réseau, Sport salle...">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Heure début</label>
        <input type="time" class="form-input" id="event-start" value="08:00">
      </div>
      <div class="form-group">
        <label class="form-label">Heure fin</label>
        <input type="time" class="form-input" id="event-end" value="10:00">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Type</label>
      <select class="form-select" id="event-type">
        <option value="cours">📚 Cours</option>
        <option value="taf">💼 Taf</option>
        <option value="conge">🏖️ Congé</option>
        <option value="sport">🏋️ Sport</option>
        <option value="perso">✨ Perso</option>
        <option value="exam">🎯 Exam / Deadline</option>
      </select>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveEvent()">Ajouter</button>
    </div>
  </div>
</div>

<script>
  const PASSWORD = 'jetset7';
  const COLORS = {
    cours: '#7c3aff',
    taf: '#2563eb',
    conge: '#16a34a',
    sport: '#ea580c',
    perso: '#db2777',
    exam: '#dc2626'
  };
  const LABELS = {
    cours: '📚 Cours',
    taf: '💼 Taf',
    conge: '🏖️ Congé',
    sport: '🏋️ Sport',
    perso: '✨ Perso',
    exam: '🎯 Deadline'
  };

  let currentDate = new Date();
  let selectedDate = null;
  let events = JSON.parse(localStorage.getItem('jsc_events') || '{}');

  // ===== LOCK =====
  function checkPassword() {
    const val = document.getElementById('pwd-input').value;
    if (val === PASSWORD) {
      document.getElementById('lock-screen').classList.add('hidden');
      document.getElementById('app').classList.add('visible');
      renderCalendar();
    } else {
      document.getElementById('lock-error').classList.add('visible');
      document.getElementById('pwd-input').value = '';
      setTimeout(() => document.getElementById('lock-error').classList.remove('visible'), 2000);
    }
  }

  document.getElementById('pwd-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  // ===== CALENDAR =====
  function renderCalendar() {
    const year  = currentDate.getFullYear();
    const month = currentDate.getMonth();

    const monthNames = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    document.getElementById('current-month').textContent = `${monthNames[month]} ${year}`;

    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';

    const firstDay = new Date(year, month, 1).getDay();
    const offset   = firstDay === 0 ? 6 : firstDay - 1;
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();

    // Cellules vides
    for (let i = 0; i < offset; i++) {
      const empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';

      const isToday = today.getDate() === d && today.getMonth() === month && today.getFullYear() === year;
      if (isToday) cell.classList.add('today');

      const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

      const num = document.createElement('div');
      num.className = 'day-number';
      num.textContent = d;
      cell.appendChild(num);

      // Événements du jour
      if (events[dateKey]) {
        events[dateKey].forEach(ev => {
          const chip = document.createElement('span');
          chip.className = 'event-chip';
          chip.style.background = COLORS[ev.type] + '33';
          chip.style.color = COLORS[ev.type];
          chip.style.border = `1px solid ${COLORS[ev.type]}55`;
          chip.textContent = `${ev.start} ${ev.title}`;
          cell.appendChild(chip);
        });
      }

      cell.addEventListener('click', () => openModal(dateKey, d, month, year));
      grid.appendChild(cell);
    }
  }

  function prevMonth() {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
  }

  function nextMonth() {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
  }

  function goToday() {
    currentDate = new Date();
    renderCalendar();
  }

  // ===== MODAL =====
  function openModal(dateKey, day, month, year) {
    selectedDate = dateKey;
    const monthNames = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    document.getElementById('modal-date-title').textContent = `${day} ${monthNames[month]} ${year}`;

    // Afficher les événements existants
    const list = document.getElementById('events-list');
    list.innerHTML = '';
    if (events[dateKey] && events[dateKey].length > 0) {
      events[dateKey].forEach((ev, idx) => {
        const item = document.createElement('div');
        item.className = 'event-item';
        item.style.background = COLORS[ev.type] + '22';
        item.style.border = `1px solid ${COLORS[ev.type]}44`;
        item.innerHTML = `
          <span style="color:${COLORS[ev.type]}">${LABELS[ev.type]}</span>
          <span style="flex:1;margin:0 10px;font-size:0.8rem">${ev.title} — ${ev.start}→${ev.end}</span>
          <button class="event-item-delete" onclick="deleteEvent('${dateKey}', ${idx})">✕</button>
        `;
        list.appendChild(item);
      });
    }

    document.getElementById('event-title').value = '';
    document.getElementById('modal-overlay').classList.add('visible');
    document.getElementById('event-title').focus();
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('visible');
    selectedDate = null;
  }

  function saveEvent() {
    const title = document.getElementById('event-title').value.trim();
    if (!title) return;

    const ev = {
      title,
      start: document.getElementById('event-start').value,
      end:   document.getElementById('event-end').value,
      type:  document.getElementById('event-type').value
    };

    if (!events[selectedDate]) events[selectedDate] = [];
    events[selectedDate].push(ev);
    localStorage.setItem('jsc_events', JSON.stringify(events));

    closeModal();
    renderCalendar();
  }

  function deleteEvent(dateKey, idx) {
    events[dateKey].splice(idx, 1);
    if (events[dateKey].length === 0) delete events[dateKey];
    localStorage.setItem('jsc_events', JSON.stringify(events));
    renderCalendar();

    // Refresh modal
    const parts = dateKey.split('-');
    openModal(dateKey, parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
  }

  // Fermer modal en cliquant dehors
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>

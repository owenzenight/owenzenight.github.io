<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jet Set Corporation</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #splash { position: fixed; inset: 0; z-index: 9999; background: #000; }
    #splash video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #splash.hidden { display: none; }

    #main { display: none; position: fixed; inset: 0; background: #000; flex-direction: column; align-items: center; justify-content: center; }
    #main.visible { display: flex; }

    #snake-canvas { position: fixed; inset: 0; z-index: 0; }

    .title-block { position: relative; z-index: 1; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 0.4em; }

    h1 {
      font-family: 'Orbitron', sans-serif; font-weight: 300;
      font-size: clamp(1.8rem, 7vw, 7rem); color: #ffffff;
      letter-spacing: 0.35em; text-transform: uppercase; padding-right: 0.35em;
    }

    #enter-link {
      font-family: 'Orbitron', sans-serif; font-weight: 300;
      font-size: clamp(0.8rem, 2.5vw, 2rem); color: rgba(255,255,255,0.35);
      letter-spacing: 0.5em; text-transform: uppercase; text-decoration: none;
      padding-right: 0.5em; padding-bottom: 6px; position: relative; transition: color 0.3s;
    }
    #enter-link::after {
      content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: calc(100% - 0.5em); height: 1px; background: rgba(255,255,255,0); transition: background 0.3s;
    }
    #enter-link:hover { color: rgba(255,255,255,0.9); }
    #enter-link:hover::after { background: rgba(255,255,255,0.9); }

    #score { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-family: 'Orbitron', sans-serif; font-size: 0.55rem; color: rgba(255,255,255,0.2); z-index: 2; text-transform: uppercase; }
    #hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); font-family: 'Orbitron', sans-serif; font-size: 0.45rem; color: rgba(255,255,255,0.12); z-index: 2; text-transform: uppercase; }
  </style>
</head>
<body>

  <div id="splash">
    <video id="intro-video" autoplay muted playsinline webkit-playsinline>
      <source src="assets/intro.mp4" type="video/mp4">
    </video>
  </div>

  <div id="main">
    <canvas id="snake-canvas"></canvas>
    <div id="score">score : 0</div>
    <div class="title-block">
      <h1>Welcome</h1>
      <a id="enter-link" href="portfolio/">— enter —</a>
    </div>
    <div id="hint">↑ ↓ ← → / z q s d — appuie pour jouer</div>
  </div>

  <script>
    const video = document.getElementById('intro-video');
    const splash = document.getElementById('splash');
    const main = document.getElementById('main');

    function showMain() {
      splash.classList.add('hidden');
      main.classList.add('visible');
      initSnake();
    }

    video.addEventListener('ended', showMain);
    // Sécurité si la vidéo met trop de temps
    setTimeout(showMain, 6000);

    // --- LE JEU DU SERPENT ---
    function initSnake() {
      const canvas = document.getElementById('snake-canvas');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const CELL = 24;
      let snake = [{x: 10, y: 10}];
      let dir = {x: 1, y: 0};
      
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#2a8c2a';
        snake.forEach(s => ctx.fillRect(s.x*CELL, s.y*CELL, CELL-1, CELL-1));
      }

      setInterval(() => {
        const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
        snake.unshift(head);
        snake.pop();
        draw();
      }, 160);

      window.addEventListener('keydown', e => {
        if(e.key === 'z' || e.key === 'ArrowUp') dir = {x: 0, y: -1};
        if(e.key === 's' || e.key === 'ArrowDown') dir = {x: 0, y: 1};
        if(e.key === 'q' || e.key === 'ArrowLeft') dir = {x: -1, y: 0};
        if(e.key === 'd' || e.key === 'ArrowRight') dir = {x: 1, y: 0};
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jet Set Corporation</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* SPLASH */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
    }
    #splash video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #splash.hidden { display: none; }

    /* PAGE PRINCIPALE */
    #main {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5em;
    }
    #main.visible { display: flex; }

    /* CANVAS SERPENT en arrière-plan */
    #snake-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.35;
    }

    /* TEXTE */
    .title-block {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3em;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 300;
      font-size: clamp(1.8rem, 7vw, 7rem);
      color: #ffffff;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      padding-right: 0.35em;
    }

    #enter-link {
      font-family: 'Orbitron', sans-serif;
      font-weight: 300;
      font-size: clamp(0.9rem, 3vw, 2.5rem);
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      text-decoration: none;
      padding-right: 0.5em;
      padding-bottom: 3px;
      border-bottom: 1px solid transparent;
      transition: color 0.3s, border-color 0.3s;
      margin-top: 0.3em;
    }
    #enter-link:hover {
      color: rgba(255,255,255,0.9);
      border-bottom: 1px solid rgba(255,255,255,0.9);
    }

    /* Score serpent */
    #score {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.2);
      z-index: 2;
      text-transform: uppercase;
    }

    /* Flèches mobile */
    #mobile-controls {
      display: none;
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .ctrl-row { display: flex; gap: 4px; }
    .ctrl-btn {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      font-family: 'Orbitron', sans-serif;
    }

    /* LIEN LOCALISATION */
    #location-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      color: rgba(255,255,255,0.4);
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-decoration: none;
      text-transform: uppercase;
      font-family: 'Orbitron', sans-serif;
      font-weight: 300;
      z-index: 100;
      padding-bottom: 3px;
      border-bottom: 1px solid transparent;
      transition: color 0.3s, border-color 0.3s;
    }
    #location-btn:hover {
      color: rgba(255,255,255,0.9);
      border-bottom: 1px solid rgba(255,255,255,0.9);
    }
  </style>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <video id="intro-video" autoplay muted playsinline webkit-playsinline>
      <source src="intro.mp4" type="video/mp4">
    </video>
  </div>

  <!-- PAGE PRINCIPALE -->
  <div id="main">
    <canvas id="snake-canvas"></canvas>

    <div id="score">score : 0</div>

    <div class="title-block">
      <h1>Welcome</h1>
      <a id="enter-link" href="portfolio.html">— enter —</a>
    </div>

    <!-- Contrôles mobile -->
    <div id="mobile-controls">
      <div class="ctrl-row">
        <div class="ctrl-btn" id="btn-up">▲</div>
      </div>
      <div class="ctrl-row">
        <div class="ctrl-btn" id="btn-left">◄</div>
        <div class="ctrl-btn" id="btn-down">▼</div>
        <div class="ctrl-btn" id="btn-right">►</div>
      </div>
    </div>
  </div>

  <!-- LOCALISATION -->
  <a id="location-btn" href="#" target="_blank">Choisy-le-Roi</a>

  <script>
    // --- Détection appareil ---
    const ua = navigator.userAgent;
    const isIOS = /iPhone|iPad|iPod/i.test(ua);
    const isAndroid = /Android/i.test(ua);
    const isMobile = isIOS || isAndroid;

    const links = {
      ios: "https://maps.apple.com/frame?center=48.754479,2.413426&distance=157.346162&map=hybrid&pitch=30.000000&span=0.000818,0.001283",
      android: "https://www.google.com/maps/search/?api=1&query=5.345317,-4.024429",
      desktop: "https://earth.google.com/web/@48.75453851,2.41349318,47.51504992a,174.46396721d,35y,26.03891465h,72.74998411t,360r/data=CgRCAggBOgMKATBCAggASg0I____________ARAA"
    };

    const locBtn = document.getElementById('location-btn');
    if (isIOS) locBtn.href = links.ios;
    else if (isAndroid) locBtn.href = links.android;
    else locBtn.href = links.desktop;

    // --- Splash ---
    const video = document.getElementById('intro-video');
    const splash = document.getElementById('splash');
    const main = document.getElementById('main');

    function showMain() {
      splash.classList.add('hidden');
      main.classList.add('visible');
      initSnake();
      if (isMobile) {
        document.getElementById('mobile-controls').style.display = 'flex';
      }
    }

    video.addEventListener('ended', showMain);
    setTimeout(showMain, 6000);
    document.addEventListener('touchstart', () => video.play(), { once: true });

    // --- JEU SERPENT ---
    function initSnake() {
      const canvas = document.getElementById('snake-canvas');
      const ctx = canvas.getContext('2d');
      const CELL = 16;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const cols = () => Math.floor(canvas.width / CELL);
      const rows = () => Math.floor(canvas.height / CELL);

      let snake = [{ x: 10, y: 10 }];
      let dir = { x: 1, y: 0 };
      let nextDir = { x: 1, y: 0 };
      let food = spawnFood();
      let score = 0;
      const scoreEl = document.getElementById('score');

      function spawnFood() {
        return {
          x: Math.floor(Math.random() * (cols() - 2)) + 1,
          y: Math.floor(Math.random() * (rows() - 2)) + 1
        };
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Serpent
        snake.forEach((seg, i) => {
          const alpha = 0.4 + (i / snake.length) * 0.6;
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
          ctx.fillRect(seg.x * CELL, seg.y * CELL, CELL - 1, CELL - 1);
        });

        // Nourriture (pixel clignotant)
        ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + 0.5 * Math.sin(Date.now() / 200)})`;
        ctx.fillRect(food.x * CELL, food.y * CELL, CELL - 1, CELL - 1);
      }

      function update() {
        dir = nextDir;
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        // Wrap autour des bords
        head.x = (head.x + cols()) % cols();
        head.y = (head.y + rows()) % rows();

        // Mange la nourriture
        if (head.x === food.x && head.y === food.y) {
          score++;
          scoreEl.textContent = `score : ${score}`;
          food = spawnFood();
        } else {
          snake.pop();
        }

        // Collision avec lui-même → reset
        if (snake.some(s => s.x === head.x && s.y === head.y)) {
          snake = [{ x: 10, y: 10 }];
          dir = { x: 1, y: 0 };
          nextDir = { x: 1, y: 0 };
          score = 0;
          scoreEl.textContent = `score : 0`;
        }

        snake.unshift(head);
      }

      // Flèches clavier
      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowUp'    && dir.y !== 1)  nextDir = { x: 0, y: -1 };
        if (e.key === 'ArrowDown'  && dir.y !== -1) nextDir = { x: 0, y: 1 };
        if (e.key === 'ArrowLeft'  && dir.x !== 1)  nextDir = { x: -1, y: 0 };
        if (e.key === 'ArrowRight' && dir.x !== -1) nextDir = { x: 1, y: 0 };
        // Empêche le scroll de la page avec les flèches
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
          e.preventDefault();
        }
      });

      // Boutons mobile
      document.getElementById('btn-up')?.addEventListener('click',    () => { if (dir.y !== 1)  nextDir = { x: 0, y: -1 }; });
      document.getElementById('btn-down')?.addEventListener('click',  () => { if (dir.y !== -1) nextDir = { x: 0, y: 1 }; });
      document.getElementById('btn-left')?.addEventListener('click',  () => { if (dir.x !== 1)  nextDir = { x: -1, y: 0 }; });
      document.getElementById('btn-right')?.addEventListener('click', () => { if (dir.x !== -1) nextDir = { x: 1, y: 0 }; });

      // Loop
      function loop() {
        update();
        draw();
      }
      setInterval(loop, 120);

      // Render continu pour l'animation du pixel nourriture
      function render() {
        draw();
        requestAnimationFrame(render);
      }
      render();
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jet Set Corporation</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* SPLASH SCREEN */
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease;
    }

    #splash video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* PAGE PRINCIPALE */
    #main {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.8s ease;
      padding: 20px;
    }

    #main.visible {
      opacity: 1;
    }

    /* Fond avec effet violet subtil */
    #main::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(120, 40, 200, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    #main h1 {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(4rem, 15vw, 10rem);
      font-weight: 400;
      text-align: center;
      background: linear-gradient(
        90deg,
        #ff0000,
        #ff8800,
        #ffff00,
        #00cc00,
        #0088ff,
        #8800ff,
        #ff00cc
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeIn 1.5s ease forwards;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* BOUTON LOCALISATION */
    #location-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(120, 40, 200, 0.15);
      border: 1px solid rgba(150, 80, 255, 0.3);
      border-radius: 50px;
      padding: 10px 16px;
      color: #fff;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-decoration: none;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      cursor: pointer;
      z-index: 100;
      font-family: 'Helvetica Neue', sans-serif;
      text-transform: uppercase;
    }

    #location-btn:hover {
      background: rgba(120, 40, 200, 0.35);
      border-color: rgba(150, 80, 255, 0.7);
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(120, 40, 200, 0.4);
    }

    #location-btn svg {
      width: 13px;
      height: 13px;
      fill: #a060ff;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <video id="intro-video" autoplay muted playsinline webkit-playsinline>
      <source src="intro.mp4" type="video/mp4">
    </video>
  </div>

  <!-- PAGE PRINCIPALE -->
  <div id="main">
    <h1>Welcome</h1>
  </div>

  <!-- BOUTON LOCALISATION -->
  <a id="location-btn" href="https://earth.google.com/web/@48.76254,2.40888,34a,5000d,35y,0h,0t,0r" target="_blank">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
    </svg>
    Choisy-le-Roi
  </a>

  <script>
    const video = document.getElementById('intro-video');
    const splash = document.getElementById('splash');
    const main = document.getElementById('main');

    function showMain() {
      if (!splash.classList.contains('hidden')) {
        splash.classList.add('hidden');
        main.classList.add('visible');
        document.body.style.overflow = 'auto';
      }
    }

    video.addEventListener('ended', showMain);
    setTimeout(showMain, 5000);

    document.addEventListener('touchstart', function() {
      video.play();
    }, { once: true });
  </script>

</body>
</html>

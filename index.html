<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jet Set Corporation</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* SPLASH SCREEN */
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      background: #000;
    }

    #splash video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #splash.hidden {
      display: none; /* Pas de transition, disparition instantanée */
    }

    /* PAGE PRINCIPALE */
    #main {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000;
    }

    #main.visible {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* WELCOME */
    #main h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 300;
      font-size: clamp(1.8rem, 7vw, 7rem);
      color: #ffffff;
      text-align: center;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      width: 100%;
      padding: 0 5vw;
    }

    /* LIEN LOCALISATION */
    #location-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-decoration: none;
      text-transform: uppercase;
      font-family: 'Orbitron', sans-serif;
      font-weight: 300;
      z-index: 100;
      padding-bottom: 3px;
      border-bottom: 1px solid transparent;
      transition: color 0.3s ease, border-bottom 0.3s ease;
    }

    #location-btn:hover {
      color: rgba(255, 255, 255, 0.9);
      border-bottom: 1px solid rgba(255, 255, 255, 0.9);
    }
  </style>
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <video id="intro-video" autoplay muted playsinline webkit-playsinline>
      <source src="intro.mp4" type="video/mp4">
    </video>
  </div>

  <!-- PAGE PRINCIPALE -->
  <div id="main">
    <h1>Welcome</h1>
  </div>

  <!-- LOCALISATION -->
  <a id="location-btn" href="https://earth.google.com/web/@48.75453851,2.41349318,47.51504992a,174.46396721d,35y,26.03891465h,72.74998411t,360r/data=CgRCAggBOgMKATBCAggASg0I____________ARAA" target="_blank">
    Choisy-le-Roi
  </a>

  <script>
    const video = document.getElementById('intro-video');
    const splash = document.getElementById('splash');
    const main = document.getElementById('main');

    function showMain() {
      splash.classList.add('hidden');
      main.classList.add('visible');
    }

    // Passage instantané quand la vidéo se termine
    video.addEventListener('ended', showMain);

    // Sécurité si la vidéo ne charge pas
    setTimeout(showMain, 6000);

    // Sur mobile, forcer la lecture au premier touch
    document.addEventListener('touchstart', function() {
      video.play();
    }, { once: true });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jet Set Corporation</title>
  <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* SPLASH SCREEN */
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease;
    }

    #splash video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* PAGE PRINCIPALE */
    #main {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    #main.visible {
      opacity: 1;
    }

    /* WELCOME */
    #main h1 {
      font-family: 'Poiret One', cursive;
      font-size: clamp(3rem, 12vw, 9rem);
      font-weight: 400;
      color: #fff;
      text-align: center;
      letter-spacing: 0.6em;
      text-transform: uppercase;
      animation: fadeIn 2s ease forwards;
      padding-right: 0.6em; /* compense le letter-spacing sur le dernier caractère */
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* LIEN LOCALISATION */
    #location-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-decoration: none;
      text-transform: uppercase;
      font-family: 'Poiret One', cursive;
      z-index: 100;
      padding-bottom: 3px;
      border-bottom: 1px solid transparent;
      transition: all 0.4s ease;
    }

    #location-btn:hover {
      color: rgba(255, 255, 255, 0.9);
      border-bottom: 1px solid rgba(255, 255, 255, 0.9);
    }
  </style>
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <video id="intro-video" autoplay muted playsinline webkit-playsinline>
      <source src="intro.mp4" type="video/mp4">
    </video>
  </div>

  <!-- PAGE PRINCIPALE -->
  <div id="main">
    <h1>Welcome</h1>
  </div>

  <!-- LOCALISATION -->
  <a id="location-btn" href="https://earth.google.com/web/@48.75453851,2.41349318,47.51504992a,174.46396721d,35y,26.03891465h,72.74998411t,360r/data=CgRCAggBOgMKATBCAggASg0I____________ARAA" target="_blank">
    Choisy-le-Roi
  </a>

  <script>
    const video = document.getElementById('intro-video');
    const splash = document.getElementById('splash');
    const main = document.getElementById('main');

    function showMain() {
      if (!splash.classList.contains('hidden')) {
        splash.classList.add('hidden');
        main.classList.add('visible');
        document.body.style.overflow = 'auto';
      }
    }

    video.addEventListener('ended', showMain);
    setTimeout(showMain, 5000);

    document.addEventListener('touchstart', function() {
      video.play();
    }, { once: true });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jet Set Corporation</title>
  <link href="https://fonts.googleapis.com/css2?family=Corinthia:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* SPLASH SCREEN */
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease;
    }

    #splash video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* PAGE PRINCIPALE - style Y2K */
    #main {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1s ease;
      overflow: hidden;
    }

    #main.visible {
      opacity: 1;
    }

    /* Fond Y2K : dégradé argenté/bleuté */
    #main::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(180, 220, 255, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 30%, rgba(200, 180, 255, 0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(150, 220, 200, 0.15) 0%, transparent 50%),
        linear-gradient(135deg, #0a0a0f 0%, #080818 50%, #0a0a12 100%);
      z-index: 0;
    }

    /* Grille Y2K subtile */
    #main::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    /* Orbes décoratifs Y2K */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      z-index: 0;
      pointer-events: none;
    }

    .orb-1 {
      width: 300px;
      height: 300px;
      background: rgba(100, 180, 255, 0.12);
      top: -50px;
      left: -80px;
      animation: float1 8s ease-in-out infinite;
    }

    .orb-2 {
      width: 200px;
      height: 200px;
      background: rgba(180, 100, 255, 0.1);
      bottom: 50px;
      right: 100px;
      animation: float2 10s ease-in-out infinite;
    }

    .orb-3 {
      width: 150px;
      height: 150px;
      background: rgba(100, 255, 200, 0.08);
      top: 30%;
      right: -50px;
      animation: float1 12s ease-in-out infinite reverse;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(20px, -30px); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-15px, 20px); }
    }

    /* WELCOME */
    #main h1 {
      font-family: 'Corinthia', cursive;
      font-size: clamp(5rem, 18vw, 13rem);
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      position: relative;
      z-index: 1;
      text-shadow:
        0 0 40px rgba(255, 255, 255, 0.3),
        0 0 80px rgba(200, 220, 255, 0.15);
      animation: fadeIn 1.5s ease forwards;
      letter-spacing: 0.02em;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* LIEN LOCALISATION */
    #location-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-decoration: none;
      text-transform: uppercase;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      z-index: 100;
      padding-bottom: 3px;
      border-bottom: 1px solid transparent;
      transition: all 0.3s ease;
    }

    #location-btn:hover {
      color: rgba(255, 255, 255, 1);
      border-bottom: 1px solid rgba(255, 255, 255, 1);
    }
  </style>
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <video id="intro-video" autoplay muted playsinline webkit-playsinline>
      <source src="intro.mp4" type="video/mp4">
    </video>
  </div>

  <!-- PAGE PRINCIPALE -->
  <div id="main">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <h1>Welcome</h1>
  </div>

  <!-- LOCALISATION -->
  <a id="location-btn" href="https://earth.google.com/web/@48.75453851,2.41349318,47.51504992a,174.46396721d,35y,26.03891465h,72.74998411t,360r/data=CgRCAggBOgMKATBCAggASg0I____________ARAA" target="_blank">
    Choisy-le-Roi
  </a>

  <script>
    const video = document.getElementById('intro-video');
    const splash = document.getElementById('splash');
    const main = document.getElementById('main');

    function showMain() {
      if (!splash.classList.contains('hidden')) {
        splash.classList.add('hidden');
        main.classList.add('visible');
        document.body.style.overflow = 'auto';
      }
    }

    video.addEventListener('ended', showMain);
    setTimeout(showMain, 5000);

    document.addEventListener('touchstart', function() {
      video.play();
    }, { once: true });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jet Set Corporation</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* SPLASH */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
    }
    #splash video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #splash.hidden { display: none; }

    /* PAGE PRINCIPALE */
    #main {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #main.visible { display: flex; }

    /* CANVAS SERPENT */
    #snake-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* TEXTE */
    .title-block {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4em;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 300;
      font-size: clamp(1.8rem, 7vw, 7rem);
      color: #ffffff;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      padding-right: 0.35em;
    }

    #enter-link {
      font-family: 'Orbitron', sans-serif;
      font-weight: 300;
      font-size: clamp(0.8rem, 2.5vw, 2rem);
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      text-decoration: none;
      padding-right: 0.5em;
      padding-bottom: 3px;
      border-bottom: 1px solid transparent;
      transition: color 0.3s, border-color 0.3s;
    }
    #enter-link:hover {
      color: rgba(255,255,255,0.9);
      border-bottom: 1px solid rgba(255,255,255,0.9);
    }

    /* Score */
    #score {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.2);
      z-index: 2;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* Hint clavier */
    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.45rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.12);
      z-index: 2;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* LIEN LOCALISATION */
    #location-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      color: rgba(255,255,255,0.4);
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-decoration: none;
      text-transform: uppercase;
      font-family: 'Orbitron', sans-serif;
      font-weight: 300;
      z-index: 100;
      padding-bottom: 3px;
      border-bottom: 1px solid transparent;
      transition: color 0.3s, border-color 0.3s;
    }
    #location-btn:hover {
      color: rgba(255,255,255,0.9);
      border-bottom: 1px solid rgba(255,255,255,0.9);
    }
  </style>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <video id="intro-video" autoplay muted playsinline webkit-playsinline>
      <source src="intro.mp4" type="video/mp4">
    </video>
  </div>

  <!-- PAGE -->
  <div id="main">
    <canvas id="snake-canvas"></canvas>
    <div id="score">score : 0</div>
    <div class="title-block">
      <h1>Welcome</h1>
      <a id="enter-link" href="portfolio.html">— enter —</a>
    </div>
    <div id="hint">↑ ↓ ← → / z q s d</div>
  </div>

  <a id="location-btn" href="#" target="_blank">Choisy-le-Roi</a>

  <script>
    // --- Détection ---
    const ua = navigator.userAgent;
    const isIOS = /iPhone|iPad|iPod/i.test(ua);
    const isAndroid = /Android/i.test(ua);
    const isMobile = isIOS || isAndroid;

    // Localisation
    const locBtn = document.getElementById('location-btn');
    if (isIOS) locBtn.href = "https://maps.apple.com/frame?center=48.754479,2.413426&distance=157.346162&map=hybrid&pitch=30.000000&span=0.000818,0.001283";
    else if (isAndroid) locBtn.href = "https://www.google.com/maps/search/?api=1&query=5.345317,-4.024429";
    else locBtn.href = "https://earth.google.com/web/@48.75453851,2.41349318,47.51504992a,174.46396721d,35y,26.03891465h,72.74998411t,360r/data=CgRCAggBOgMKATBCAggASg0I____________ARAA";

    // Splash
    const video = document.getElementById('intro-video');
    const splash = document.getElementById('splash');
    const main  = document.getElementById('main');

    function showMain() {
      splash.classList.add('hidden');
      main.classList.add('visible');
      if (!isMobile) initSnake();
      else {
        // Sur mobile : pas de serpent, pas de hint
        document.getElementById('snake-canvas').style.display = 'none';
        document.getElementById('score').style.display = 'none';
        document.getElementById('hint').style.display = 'none';
      }
    }

    video.addEventListener('ended', showMain);
    setTimeout(showMain, 6000);
    document.addEventListener('touchstart', () => video.play(), { once: true });

    // --- SERPENT ---
    function initSnake() {
      const canvas = document.getElementById('snake-canvas');
      const ctx = canvas.getContext('2d');
      const CELL = 24; // pixels plus gros
      const GREEN = '#3dff3d';
      const DARK_GREEN = '#1a8c1a';
      const RED = '#ff2222';

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const cols = () => Math.floor(canvas.width  / CELL);
      const rows = () => Math.floor(canvas.height / CELL);

      let snake   = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      let dir     = { x: 1, y: 0 };
      let nextDir = { x: 1, y: 0 };
      let food    = spawnFood();
      let score   = 0;
      const scoreEl = document.getElementById('score');

      function spawnFood() {
        let f;
        do {
          f = {
            x: Math.floor(Math.random() * (cols() - 2)) + 1,
            y: Math.floor(Math.random() * (rows() - 2)) + 1
          };
        } while (snake.some(s => s.x === f.x && s.y === f.y));
        return f;
      }

      function drawCell(x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x * CELL, y * CELL, CELL - 1, CELL - 1);
      }

      function drawHead(x, y) {
        // Corps de la tête
        ctx.fillStyle = GREEN;
        ctx.fillRect(x * CELL, y * CELL, CELL - 1, CELL - 1);

        // Yeux : petits carrés noirs selon la direction
        ctx.fillStyle = '#000';
        const eyeSize = Math.max(2, Math.floor(CELL / 6));
        const offset  = Math.floor(CELL / 4);

        if (dir.x === 1) { // droite
          ctx.fillRect(x*CELL + CELL - offset - eyeSize, y*CELL + offset,              eyeSize, eyeSize);
          ctx.fillRect(x*CELL + CELL - offset - eyeSize, y*CELL + CELL - offset - eyeSize - 1, eyeSize, eyeSize);
        } else if (dir.x === -1) { // gauche
          ctx.fillRect(x*CELL + offset, y*CELL + offset,              eyeSize, eyeSize);
          ctx.fillRect(x*CELL + offset, y*CELL + CELL - offset - eyeSize - 1, eyeSize, eyeSize);
        } else if (dir.y === -1) { // haut
          ctx.fillRect(x*CELL + offset,              y*CELL + offset, eyeSize, eyeSize);
          ctx.fillRect(x*CELL + CELL - offset - eyeSize - 1, y*CELL + offset, eyeSize, eyeSize);
        } else { // bas
          ctx.fillRect(x*CELL + offset,              y*CELL + CELL - offset - eyeSize - 1, eyeSize, eyeSize);
          ctx.fillRect(x*CELL + CELL - offset - eyeSize - 1, y*CELL + CELL - offset - eyeSize - 1, eyeSize, eyeSize);
        }

        // Langue rouge
        ctx.fillStyle = RED;
        const lSize = Math.max(2, Math.floor(CELL / 8));
        const cx = x * CELL + Math.floor((CELL - 1) / 2);
        const cy = y * CELL + Math.floor((CELL - 1) / 2);

        if (dir.x === 1)  ctx.fillRect(x*CELL + CELL - 1, cy - lSize, lSize * 2, lSize);
        if (dir.x === -1) ctx.fillRect(x*CELL - lSize * 2, cy - lSize, lSize * 2, lSize);
        if (dir.y === -1) ctx.fillRect(cx - lSize, y*CELL - lSize * 2, lSize, lSize * 2);
        if (dir.y === 1)  ctx.fillRect(cx - lSize, y*CELL + CELL - 1, lSize, lSize * 2);
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Corps
        for (let i = 1; i < snake.length; i++) {
          drawCell(snake[i].x, snake[i].y, GREEN);
        }

        // Tête
        drawHead(snake[0].x, snake[0].y);

        // Nourriture clignotante verte
        const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 200);
        ctx.fillStyle = `rgba(61, 255, 61, ${pulse})`;
        ctx.fillRect(food.x * CELL, food.y * CELL, CELL - 1, CELL - 1);
      }

      function update() {
        dir = { ...nextDir };
        const head = {
          x: (snake[0].x + dir.x + cols()) % cols(),
          y: (snake[0].y + dir.y + rows()) % rows()
        };

        if (head.x === food.x && head.y === food.y) {
          score++;
          scoreEl.textContent = `score : ${score}`;
          food = spawnFood();
        } else {
          snake.pop();
        }

        if (snake.some(s => s.x === head.x && s.y === head.y)) {
          snake   = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
          dir     = { x: 1, y: 0 };
          nextDir = { x: 1, y: 0 };
          score   = 0;
          scoreEl.textContent = `score : 0`;
        }

        snake.unshift(head);
      }

      // Clavier
      document.addEventListener('keydown', e => {
        const k = e.key;
        if ((k==='ArrowUp'    || k==='z') && dir.y !==  1) nextDir = { x: 0, y: -1 };
        if ((k==='ArrowDown'  || k==='s') && dir.y !== -1) nextDir = { x: 0, y:  1 };
        if ((k==='ArrowLeft'  || k==='q') && dir.x !==  1) nextDir = { x: -1, y: 0 };
        if ((k==='ArrowRight' || k==='d') && dir.x !== -1) nextDir = { x:  1, y: 0 };
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(k)) e.preventDefault();
      });

      setInterval(update, 120);

      function render() { draw(); requestAnimationFrame(render); }
      render();
    }
  </script>

</body>
</html>
